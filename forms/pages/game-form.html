<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <!-- Config (load FIRST) -->
  <script src="../../js/config.js"></script>

  <title>Game Form — Schema Driven</title>

  <script>
  (function(){
    const ok = localStorage.getItem('auth_ok')==='1' &&
               Number(localStorage.getItem('auth_until')||0) > Date.now();
    if(!ok){ window.location.href = '../../index.html#login'; }
  })();
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../style.css"/>

  <style>
    .container { max-width: 1100px; margin: 0 auto; padding: 16px; }

    /* Form engine styles */
    .form-engine-container { display: grid; gap: 16px; }
    .form-title { font-size: 1.5rem; font-weight: 800; margin-bottom: 0.5rem; }

    .card {
      background: rgba(255,255,255,.05);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      box-shadow: var(--shadow-soft, 0 8px 24px rgba(0,0,0,.18));
    }

    .field { margin: 12px 0; }
    .label {
      font-weight: 800;
      font-size: .95rem;
      opacity: .9;
      margin-bottom: 6px;
      display: block;
    }

    .form-input, .form-select {
      width: 100%;
      padding: .68rem .8rem;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,.28);
      background: rgba(255,255,255,.08);
      color: #fff;
    }

    .btn {
      appearance: none;
      border: 1px solid rgba(255,255,255,.25);
      background: rgba(255,255,255,.08);
      color: #fff;
      padding: .55rem .8rem;
      border-radius: 10px;
      font-weight: 800;
      cursor: pointer;
      transition: all .2s ease;
    }
    .btn.primary {
      background: linear-gradient(135deg,#7C4DFF,#8B5CF6);
      color: #071018;
      border: 0;
    }
    .btn.subtle { background: transparent; }
    .btn.warn { background: #ffa142; color: #2a1800; }
    .btn.success { background: #43b581; color: #071a12; }

    .btnbar { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }

    /* Toggle styling */
    .toggle-row {
      display: grid;
      grid-template-columns: auto 1fr;
      align-items: center;
      gap: 12px;
      margin: 8px 0;
    }
    .tgl {
      position: relative;
      display: inline-flex;
      align-items: center;
      width: 54px;
      height: 30px;
      border-radius: 999px;
      background: rgba(255,255,255,.18);
      border: 1px solid rgba(255,255,255,.18);
      cursor: pointer;
      user-select: none;
      transition: .15s;
    }
    .tgl::after {
      content: "";
      width: 24px;
      height: 24px;
      border-radius: 999px;
      background: #d1d5db;
      position: absolute;
      left: 3px;
      top: 50%;
      transform: translateY(-50%);
      transition: .15s;
    }
    .tgl[aria-checked="true"] {
      background: #43b581;
      border-color: #43b581;
    }
    .tgl[aria-checked="true"]::after {
      left: 27px;
      background: #071a12;
    }

    /* Segmented buttons */
    .seg {
      display: flex;
      flex-wrap: wrap;
      gap: .5rem .55rem;
    }
    .seg-btn {
      padding: .45rem .75rem;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.22);
      background: transparent;
      line-height: 1;
      cursor: pointer;
      flex: 0 0 auto;
      white-space: nowrap;
      color: #fff;
    }
    .seg-btn[aria-pressed="true"] {
      background: #43b581;
      color: #071a12;
      border-color: transparent;
    }

    /* Grade buttons */
    .grade-buttons { display: flex; gap: 8px; flex-wrap: wrap; }
    .grade-buttons button.active {
      background: #43b581;
      color: #071a12;
    }

    /* Player picker */
    .player-picker .selected-player {
      margin-top: 8px;
      padding: 8px;
      background: rgba(139,92,246,.15);
      border: 1px solid rgba(139,92,246,.3);
      border-radius: 8px;
    }

    /* Log */
    .log-section { font-size: .9rem; }
    .log-section > div { max-height: 200px; overflow-y: auto; }

    /* Rep counter */
    .rep-counter .rep-controls {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .rep-counter .rep-value {
      min-width: 40px;
      text-align: center;
      font-size: 1.5rem;
      font-weight: 800;
    }

    textarea.form-input { resize: vertical; }
  </style>
</head>

<body class="theme-atl practice-page">
  <header class="page-header">
    <h1 id="pageTitle">Game Form</h1>
    <nav class="menu-actions">
      <a class="menu-btn" href="../../index.html">Home</a>
      <a class="menu-btn" href="../../game/game-day.html">Game Day</a>
    </nav>

    <div class="container">
      <div id="app">

      </div>

  </main>

  <footer class="site-footer">
    <p>&copy; 2025 Game Speed Data Systems</p>
  </footer>

  <!-- ESM Entry Point -->
  <script type="module" src="../../src/entry/forms-game-form.js"></script>
</body>
</html>
